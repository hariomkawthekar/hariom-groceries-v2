services:
  - type: web
    name: hariom-groceries
    runtime: node
    region: oregon
    buildCommand: npm ci && npm run build
    startCommand: node server.js
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: ""
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
